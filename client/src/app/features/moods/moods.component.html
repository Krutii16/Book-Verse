<div class="min-h-screen bg-gray-50 py-12 px-4">
  <div class="max-w-7xl mx-auto">

    <!-- Page Heading -->
    <h1 class="text-4xl font-bold mb-4 text-gray-800">
      Find Books by Mood
    </h1>
    <p class="text-gray-600 mb-10">
      What’s your mood today? Select one to find the perfect book.
    </p>

    <!-- Loading Spinner -->
    <div *ngIf="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <!-- Mood Grid -->
    <div *ngIf="!loading"
         class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-10">

      <button *ngFor="let mood of moods; let i = index"
              (click)="selectMood(mood)"
              [ngClass]="getCategoryClass(i)"
              [class.ring-4]="selectedMood?.id === mood.id"
              class="category-card text-center transition-all">

        <div class="text-4xl mb-3">
          {{ mood.emoji }}
        </div>

        <p class="font-semibold text-lg">
          {{ mood.name }}
        </p>

      </button>

    </div>

    <!-- Selected Mood Books -->
    <div *ngIf="selectedMood && moodBooks.length > 0">

      <h2 class="text-2xl font-bold mb-6 text-gray-800">
        Books for "{{ selectedMood.name }}" Mood
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        <div *ngFor="let book of moodBooks"
             class="card hover:shadow-lg transition">

          <h3 class="font-semibold truncate mb-2">
            {{ book.title }}
          </h3>

          <p class="text-sm text-gray-600">
            by {{ book.author }}
          </p>

          <p class="font-bold mt-4 text-blue-600">
            ₹{{ book.price }}
          </p>

          <button class="btn btn-accent mt-4 w-full"
                  (click)="addToCart(book)">
            Add to Cart
          </button>

        </div>

      </div>

    </div>

    <!-- No Books Found -->
    <div *ngIf="selectedMood && moodBooks.length === 0"
         class="text-gray-500 mt-6">
      No books found for this mood.
    </div>

  </div>
</div>
