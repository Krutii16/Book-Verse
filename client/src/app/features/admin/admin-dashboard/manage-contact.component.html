<div class="container py-8">
  <br/>
  <h1 class="text-3xl font-bold mb-6">Contact Messages</h1>

  <div *ngFor="let contact of contacts" class="card mb-4 p-4 shadow-lg rounded-lg bg-white">
    
    <h2 class="text-xl font-semibold">{{ contact.name }}</h2>
    <p class="text-gray-600">{{ contact.email }}</p>

    <p class="mt-2 font-medium">Message:</p>
    <p class="text-gray-700">{{ contact.message }}</p>

    <p class="text-sm text-gray-400 mt-2">
      {{ contact.createdAt | date:'medium' }}
    </p>

  </div>
</div>
