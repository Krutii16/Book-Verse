<div class="p-6">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Manage Books</h1>

    <button 
      (click)="openAddForm()"
      class="bg-blue-600 text-white px-4 py-2 rounded">
      + Add New Book
    </button>
  </div>

  <!--  Book List -->
  <div class="grid md:grid-cols-3 gap-4">

    <div *ngFor="let book of books" class="bg-white p-4 shadow rounded">

      <img 
        *ngIf="book.image"
        [src]="book.image"
        class="w-full h-40 object-cover mb-2 rounded"
      />

      <h2 class="font-bold text-lg">{{book.title}}</h2>
      <div class="flex justify-between items-center mb-3">
                <span class="text-2xl font-bold text-blue-600">₹{{ book.price }}</span>
                <span *ngIf="book.discount" class="text-xs bg-red-500 text-white px-2 py-1 rounded">
                  -{{ book.discount }}%
                </span>
              </div>
              <div class="flex justify-between items-center">
                <div class="flex items-center">
                  <span class="text-yellow-500">★</span>
                  <span class="ml-1 text-sm text-gray-600">{{ book.rating }}</span>
                </div>
                <span class="text-xs text-gray-500">({{ book.reviews }} reviews)</span>
              </div>
           

      <div class="flex gap-2 mt-3">

        <button 
          (click)="editBook(book)"
          class="bg-blue-400 px-3 py-1 rounded">
          Edit
        </button>

        <button 
          (click)="deleteBook(book._id)"
          class="bg-red-500 text-white px-3 py-1 rounded">
          Delete
        </button>

      </div>

    </div>

  </div>

  <!--  ADD / EDIT POPUP -->
 <div *ngIf="showForm" class="fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center">

  <div class="bg-white p-6 rounded shadow w-[700px]">

    <h1 class="text-2xl font-bold text-blue-600 text-center mb-6">
      {{ isEdit ? 'Edit Book' : 'Add Book' }}
    </h1>

    <!-- GRID FORM -->
    <div class="grid grid-cols-2 gap-4">

      <input [(ngModel)]="bookData.title" placeholder="Title"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.author" placeholder="Author"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.isbn" placeholder="ISBN"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.genre" placeholder="Genre"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.price" type="number" placeholder="Price"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.quantity" type="number" placeholder="Quantity"
        class="border p-2 rounded">

      <input [(ngModel)]="bookData.discount" type="number" placeholder="Discount"
        class="border p-2 rounded">
    
      <input [(ngModel)]="bookData.rating" type="number" placeholder="Rating"
        class="border p-2 rounded">

      <input type="file" (change)="onImageUpload($event)"
        class="border p-2 rounded">

      <!-- FULL WIDTH -->
      <textarea [(ngModel)]="bookData.description"
        placeholder="Describe the book"
        class="border p-2 rounded col-span-2"></textarea>

    </div>

    <!-- BUTTONS -->
    <div class="flex justify-end gap-2 mt-6">

      <button 
        (click)="saveBook()"
        class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
        Save
      </button>

      <button 
        (click)="closeForm()"
        class="bg-gray-400 px-4 py-2 rounded hover:bg-gray-500">
        Cancel
      </button>

    </div>

  </div>

</div>
