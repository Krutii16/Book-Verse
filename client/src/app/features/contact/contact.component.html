<div class="container py-8">
  <h1 class="text-3xl font-bold mb-8">Contact Us</h1>
  
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="card">
      <h2 class="text-2xl font-semibold mb-6">Get in Touch</h2>
      
      <form [formGroup]="contactForm" (ngSubmit)="submitForm()">
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">Name</label>
          <input type="text" 
                 formControlName="name"
                 placeholder="Your name"
                 class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">Email</label>
          <input type="email" 
                 formControlName="email"
                 placeholder="your@email.com"
                 class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">Subject</label>
          <input type="text" 
                 formControlName="subject"
                 placeholder="Subject"
                 class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">Message</label>
          <textarea formControlName="message"
                    placeholder="Your message"
                    rows="5"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent"></textarea>
        </div>
        
        <button type="submit" 
                class="btn btn-accent w-full"
                [disabled]="contactForm.invalid">
          Send Message
        </button>
      </form>
      
      <div *ngIf="successMessage" class="success-message mt-4">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="error-message mt-4">{{ errorMessage }}</div>
    </div>
    
    <div class="card">
      <h2 class="text-2xl font-semibold mb-6">Contact Information</h2>
      <div class="space-y-6">
        <div>
          <h3 class="font-semibold mb-2">Address</h3>
          <p class="text-gray-600">BookVerse Headquarters<br>123 Book Street<br>Delhi, India 110001</p>
        </div>
        
        <div>
          <h3 class="font-semibold mb-2">Email</h3>
          <p class="text-gray-600">support@bookverse.com</p>
        </div>
        
        <div>
          <h3 class="font-semibold mb-2">Phone</h3>
          <p class="text-gray-600">+91 9876543210</p>
        </div>
        
        <div>
          <h3 class="font-semibold mb-2">Hours</h3>
          <p class="text-gray-600">Monday - Friday: 9:00 AM - 6:00 PM<br>Saturday: 10:00 AM - 4:00 PM<br>Sunday: Closed</p>
        </div>
      </div>
    </div>
  </div>
</div>
