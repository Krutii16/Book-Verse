<div class="container py-8">
  <h1 class="text-3xl font-bold mb-8">Bestsellers</h1>
  <p class="text-gray-600 mb-8">Discover the most popular books among our readers</p>
  
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
  </div>
  
  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div *ngFor="let book of bestsellers" class="card">
      <h3 class="font-semibold truncate">{{ book.title }}</h3>
      <p class="text-sm text-gray-600">{{ book.author }}</p>
      <div class="flex items-center mt-2">
        <span class="text-yellow-500">★</span>
        <span class="text-sm ml-2">{{ book.rating }} ({{ book.reviews }})</span>
      </div>
      <p class="font-bold mt-4">₹{{ book.price }}</p>
      <div class="flex gap-2 mt-4">
        <button class="btn btn-accent flex-1" (click)="viewBook(book)">View</button>
        <button class="btn btn-secondary flex-1" (click)="addToCart(book)">Add</button>
      </div>
    </div>
  </div>
</div>
