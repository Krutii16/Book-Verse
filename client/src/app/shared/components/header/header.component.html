<header class="sticky top-0 z-40 bg-white shadow-sm border-b border-gray-200">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="text-2xl font-bold text-blue-600">BookVerse</a>
      </div>

      <!-- Navigation Links -->
      <div class="hidden md:flex space-x-6">
        <a routerLink="/books" class="text-gray-700 hover:text-blue-600 transition">Books</a>
        <a routerLink="/categories" class="text-gray-700 hover:text-blue-600 transition">Categories</a>
        <a routerLink="/bestsellers" class="text-gray-700 hover:text-blue-600 transition">Bestsellers</a>
        <a routerLink="/moods" class="text-gray-700 hover:text-blue-600 transition">Moods</a>
        <a
  *ngIf="!(user$ | async)?.isAdmin"
  routerLink="/contact"
  class="text-gray-700 hover:text-blue-600 transition"
>
  Contact
</a>
      <a *ngIf="(user$ | async) && !isAdmin" routerLink="/my-orders">
    My Orders
  </a>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 max-w-xs mx-6">
        <div class="relative">
          <input
            type="text"
            placeholder="Search books by Title & Author..."
            [(ngModel)]="searchQuery"
            (keyup.enter)="search()"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <div *ngIf="showSearchResults && searchResults.length > 0" class="absolute top-full left-0 right-0 bg-white border border-gray-300 rounded-lg mt-1 shadow-lg">
            <div *ngFor="let result of searchResults.slice(0, 5)" (click)="goToBook(result._id)" class="px-4 py-2 hover:bg-gray-100 cursor-pointer border-b">
              {{ result.title }} by {{ result.author }}
            </div>
          </div>
        </div>
      </div>

      <!-- Right side icons -->
      <div class="flex items-center space-x-6">
        <!-- Cart -->
        <a *ngIf="(user$ | async) && !isAdmin" routerLink="/cart" class="relative text-gray-700 hover:text-blue-600 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span *ngIf="cartItems$ | async as items" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
            {{ items.length }}
          </span>
        </a>

        <!-- User Menu -->
        <div *ngIf="user$ | async as user" class="flex items-center space-x-4">
          <span *ngIf="user" class="text-sm text-gray-700">{{ user.name }}</span>
          <button (click)="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
            Logout
          </button>
          <a *ngIf="user?.isAdmin" routerLink="/admin" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
            Admin
          </a>
        </div>

        <!-- Auth Links -->
        <div *ngIf="!(user$ | async)" class="flex items-center space-x-4">
          <a routerLink="/login" class="text-gray-700 hover:text-blue-600 transition">Login</a>
          <a routerLink="/register" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
            Register
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
