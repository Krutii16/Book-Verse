<div class="container py-8">
  <h1 class="text-3xl font-bold mb-6">Manage Orders</h1>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center text-gray-500">
    Loading orders...
  </div>

  <!-- Error -->
  <div *ngIf="error" class="text-red-500">
    {{ error }}
  </div>

  <!-- Orders -->
  <div *ngFor="let order of orders || []" class="bg-white shadow rounded-lg p-6 mb-6">

    <!-- User Email -->
    <h2 class="text-lg font-bold text-blue-600">
      {{ order.userEmail }}
    </h2>

    <!-- Status -->
    <div class="flex justify-between items-center mt-2">
      <p class="text-sm">
        Status:
        <span
          [ngClass]="{
            'text-yellow-500': order.status === 'pending',
            'text-blue-500': order.status === 'confirmed',
            'text-purple-500': order.status === 'shipped',
            'text-green-600': order.status === 'delivered'
          }"
          class="font-semibold">
          {{ order.status }}
        </span>
      </p>

      <!-- Change Status -->
      <!-- <select
        (change)="updateStatus(order._id, $any($event.target).value)"
        class="border p-1 rounded">
        <option value="">Update</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
      </select>-->
    </div>

    <!-- Address -->
    <p class="text-sm text-gray-500 mt-1">
      Address: {{ order.shippingAddress }}
    </p>

    <!-- Date -->
    <p class="text-gray-400 text-sm mb-2">
      {{ order.createdAt | date:'medium' }}
    </p>

    <!-- Books -->
    <div class="mt-4">
      <h3 class="font-semibold mb-2">Books:</h3>

      <div *ngFor="let book of order.books || []"
           class="flex justify-between border-b py-2 text-sm">

        <span class="font-medium">{{ book.title }}</span>

        <span>Qty: {{ book.quantity }}</span>

        <span>₹{{ book.price }}</span>
      </div>
    </div>

    <!-- Total -->
    <div class="mt-4 text-right font-bold text-green-600">
      Total: ₹{{ order.totalPrice }}
    </div>

  </div>

  <!-- No Orders -->
  <div *ngIf="!loading && (orders?.length === 0)" class="text-gray-500 text-center">
    No orders found
  </div>
</div>
