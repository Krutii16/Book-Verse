<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-7xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-8">Browse Books</h1>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
      <!-- Filters Sidebar -->
      <div class="md:col-span-1">
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-lg font-bold mb-4">Filters</h3>

          <!-- Genre Filter -->
          <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">Genre</label>
            <select [(ngModel)]="selectedGenre" (change)="filterBooks()" class="w-full p-2 border border-gray-300 rounded-lg">
              <option value="">All Genres</option>
              <option *ngFor="let genre of genres" [value]="genre.name.toLowerCase()">{{ genre.name }}</option>
            </select>
          </div>

          <!-- Price Filter -->
          <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">Price Range</label>
            <input type="number" [(ngModel)]="minPrice" placeholder="Min" class="w-full p-2 border border-gray-300 rounded-lg mb-2">
            <input type="number" [(ngModel)]="maxPrice" placeholder="Max" class="w-full p-2 border border-gray-300 rounded-lg mb-2">
            <button (click)="filterBooks()" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
              Apply
            </button>
          </div>

          <!-- Sort -->
          <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">Sort By</label>
            <select [(ngModel)]="sortBy" (change)="filterBooks()" class="w-full p-2 border border-gray-300 rounded-lg">
              <option value="latest">Latest</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Best Rated</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Books Grid -->
      <div class="md:col-span-3">
        <div *ngIf="loading" class="flex justify-center py-12">
          <p class="text-gray-500">Loading books...</p>
        </div>

        <div *ngIf="!loading && books.length === 0" class="text-center py-12">
          <p class="text-gray-500 text-lg">No books found. Try adjusting your filters.</p>
        </div>

        <div *ngIf="!loading && books.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div *ngFor="let book of books" [routerLink]="['/books', book._id]"
               class="bg-white rounded-lg shadow hover:shadow-lg transition overflow-hidden cursor-pointer">
            <div class="bg-gray-200 h-48 flex items-center justify-center">
              <img *ngIf="book.image" [src]="book.image" [alt]="book.title" class="w-full h-full object-cover">
            </div>
            <div class="p-4">
              <h3 class="font-bold text-lg text-gray-800 mb-1 truncate">{{ book.title }}</h3>
              <p class="text-sm text-gray-600 mb-3">by {{ book.author }}</p>
              <div class="flex justify-between items-center mb-3">
                <span class="text-2xl font-bold text-blue-600">₹{{ book.price }}</span>
                <span *ngIf="book.discount" class="text-xs bg-red-500 text-white px-2 py-1 rounded">
                  -{{ book.discount }}%
                </span>
              </div>
              <div class="flex justify-between items-center">
                <div class="flex items-center">
                  <span class="text-yellow-500">★</span>
                  <span class="ml-1 text-sm text-gray-600">{{ book.rating }}</span>
                </div>
                <span class="text-xs text-gray-500">({{ book.reviews }} reviews)</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-8" *ngIf="totalBooks > limit">
         <button
  *ngFor="let pageNum of pages"
  (click)="changePage(pageNum)"
  [class.bg-blue-600]="page === pageNum"
  class="px-3 py-1 border rounded">
  {{ pageNum }}
</button>
        </div>
      </div>
    </div>
  </div>
</div>
